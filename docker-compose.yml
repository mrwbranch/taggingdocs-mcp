services:
  gtm-mcp:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - BASE_URL=${BASE_URL:-https://mcp.taggingdocs.com}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - DATA_DIR=/data
    volumes:
      - gtm-mcp-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  gtm-mcp-data:
